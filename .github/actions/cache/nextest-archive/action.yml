name: Nextest Archive Cache
description: |
    Nextest binary archive cache management.

inputs:
  action:
    description: "Type of operation (check,restore,create)"
    required: false
    default: "check"
  archive-file:
    description: "The test archive file"
    required: true
  codecov-binary-path:
    description: "Code coverage binary path"
    required: false
    default: "./target/debug/"

outputs:
  cache-hit:
    description: "Cache Hit"
    value: ${{ steps.check_cache.outputs.cache-hit }}
  cache-key:
    description: "Cache Key"
    value: ${{ steps.generate-keys.outputs.nextest-archive-cache-key }}

runs:
  using: "composite"
  steps:
    # Generate cache keys
    - name: Generate Cache Keys
      id: generate-keys
      uses: ./.github/actions/cache/generate-keys
  
    # Check if cache data exists
    - name: Check Cache
      if: |
        inputs.action == 'check'
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      id: check_cache
      with:
        lookup-only: true
        path: |
          ${{ inputs.archive-file }}
          ${{ inputs.codecov-binary-path }}
        key: ${{ steps.generate-keys.outputs.nextest-archive-cache-key }}

    # Restore cache data
    - name: Restore Cache
      if: |
        inputs.action == 'restore'
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ${{ inputs.archive-file }}
          ${{ inputs.codecov-binary-path }}
        key: ${{ steps.generate-keys.outputs.nextest-archive-cache-key }}
        fail-on-cache-miss: true

    # Checkout the code
    - name: Checkout the latest code
      if: |
        inputs.action == 'create'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ github.event.pull_request.head.sha || github.ref }}

    # Setup rust toolchain
    - name: Setup Rust Toolchain
      if: |
        inputs.action == 'create'
      uses: ./.github/actions/setup-rust-toolchain
      with:
        components: llvm-tools-preview

    #  Install nextest
    - name: Install nextest
      if: |
        inputs.action == 'create'
      uses: ./.github/actions/install-tool
      with:
        tools: nextest
    
    # Install mold linker and clang (faster than default)      
    - name: Install mold Linker (and clang)
      if: |
        inputs.action == 'create'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y mold clang

    # Restore the cargo cache (which we may have just built)
    - name: Restore Cargo Cache
      if: |
        inputs.action == 'create'
      uses: ./.github/actions/cache/cargo
      with:
        action: restore

    # Build the nextest archive
    - name: Build Nextest Archive
      if: |
        inputs.action == 'create'
      shell: bash
      env:
        RUSTFLAGS: "-C instrument-coverage -C linker=clang -C link-arg=-fuse-ld=mold -A warnings"
        CARGO_INCREMENTAL: 0
      # This command should be kept in sync with the same command in cache/cargo action
      run: |
        # Capture the archive file input, then expand the leading ~ to $HOME
        INPUT_FILE="${{ inputs.archive-file }}"
        ARCHIVE_FILE="${INPUT_FILE/#\~/$HOME}"

        cargo nextest archive \
          --workspace \
          --tests \
          --locked \
          --features monitoring_prom \
          --archive-file "$ARCHIVE_FILE"

    # Save cache data
    # Includes contents of ./target/debug because they're needed for both unit tests and code coverage
    - name: Save Cache
      if: |
        inputs.action == 'create'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ${{ inputs.archive-file }}
          ${{ inputs.codecov-binary-path }}
        key: ${{ steps.generate-keys.outputs.nextest-archive-cache-key }}
