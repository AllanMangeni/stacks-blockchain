name: Generate Cache Keys
description: |
    Generates Bitcoin and Cargo cache keys used in CI.

inputs:
  btc-version:
    description: "The Bitcoin binary version"
    required: false
    default: "25.0"

outputs:
  bitcoin-binary-version:
    description: "Bitcoin Binary Version"
    value: ${{ steps.generate-bitcoin-cache-key.outputs.binary-version }}
  bitcoin-cache-key:
    description: "Bitcoin Cache Key"
    value: ${{ steps.generate-bitcoin-cache-key.outputs.cache-key }}
  cargo-cache-key:
    description: "Cargo Cache Key"
    value: ${{ steps.generate-cargo-cache-key.outputs.cache-key }}
  nextest-archive-cache-key:
    description: "Nextest Archive Cache Key"
    value: ${{ steps.generate-nextest-archive-cache-key.outputs.cache-key }}

runs:
  using: "composite"
  steps:
    - name: Generate Bitcoin Cache Key
      id: generate-bitcoin-cache-key
      shell: bash
      env:
        BITCOIN_BINARY_VERSION: ${{ inputs.btc-version }}
      run: |
        echo "cache-key=bitcoin-binary--${{ env.BITCOIN_BINARY_VERSION }}" >> "$GITHUB_OUTPUT"
        echo "binary-version=${{ env.BITCOIN_BINARY_VERSION }}" >> "$GITHUB_OUTPUT"

    - name: Generate Cargo Cache Key
      id: generate-cargo-cache-key
      shell: bash
      run: |
        echo "cache-key=cargo-crates--${{ runner.os }}" >> "$GITHUB_OUTPUT"
        
    - name: Generate Nextest Archive Cache key
      id: generate-nextest-archive-cache-key
      shell: bash
      run: |
        echo "cache-key=nextest-archive--${{ github.event.pull_request.head.sha || github.sha }}" >> "$GITHUB_OUTPUT"
