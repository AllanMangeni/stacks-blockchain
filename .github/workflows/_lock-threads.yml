# Workflow to close stale Issues and PRs

name: "Lock Threads"

on:
  schedule:
    # Run at 00:00 UTC daily
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  actions: write
  issues: write
  pull-requests: write

# Configure concurrency
concurrency:
  group: lock-threads

jobs:
  # Lock closed issues/prs/discussions
  lock:
    name: Lock Threads
    runs-on: ubuntu-latest
    steps:
      - name: Lock Threads
        # Only execute if running in our core repo. The CRON schedule will run against `master` which is intended
        if: |
          github.repository == 'stacks-network/stacks-core' &&
          github.ref_name == 'master'
        uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          days-before-stale: 7 # after 7 days, adds `stale` tag and warns contributor
          days-before-close: 7 # after 7 more days, closes the Issue / PR / Discussion
          stale-issue-message: "This Issue has been inactive for 7 days. After 7 more days of inactivity, it will be automatically closed."
          stale-pr-message: "This PR has been inactive for 7 days. After 7 more days of inactivity, it will be automatically closed."
          close-issue-message: "This Issue has been automatically closed after 14 days of inactivity."
          close-pr-message: "This PR has been automatically closed after 14 days of inactivity."
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
