# Github workflow to setup reusable test caches

name: "Setup: Test Caches"

on:
  workflow_call:
    inputs:
      create-if-missing:
        description: "Whether to create and upload caches if they are missing"
        required: true
        type: boolean

# Set default permissions
permissions:
  contents: read

# Set default env vars
env:
  RUSTFLAGS: "-C instrument-coverage -A warnings"
  LLVM_PROFILE_FILE: "stacks-core-%p-%m.profraw"

# Configure concurrency
#   - cache will exist longer than workflow execution so other runners have access.
#   - multiple test workflows may call setup-test-caches simultaneously for the same ref. They share a concurrency slot so only one actively builds; others wait and then find the caches already populated.
#   - runs on PR branches cancel old builds when a new commit arrives (github.head_ref is only set in a PR context).
concurrency:
  group: setup-test-caches-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.head_ref != '' }}

jobs:
  # Check which caches already exist before creating them
  check-caches:
    name: Check Existing Caches
    runs-on: ubuntu-latest
    outputs:
      bitcoin-cache-hit: ${{ steps.bitcoin.outputs.cache-hit }}
      cargo-cache-hit: ${{ steps.cargo.outputs.cache-hit }}
    steps:
      # Checkout the code
      #   - only .github is required for checking caches
      - name: Checkout the latest code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Check cache for bitcoin binary
      - name: Check Bitcoin Cache
        id: bitcoin
        uses: ./.github/actions/cache/bitcoin

      # Check cache for cargo binaries
      - name: Check Cargo Cache
        id: cargo
        uses: ./.github/actions/cache/cargo

      # Output a job summary of cache status and crash the CI run if a cache is missing and won't be created
      - name: Output GitHub Job Summary
        shell: bash
        env:
          CREATE_IF_MISSING: ${{ inputs.create-if-missing }}
          BITCOIN_KEY: ${{ steps.bitcoin.outputs.cache-key }}
          BITCOIN_HIT: ${{ steps.bitcoin.outputs.cache-hit }}
          CARGO_KEY: ${{ steps.cargo.outputs.cache-key }}
          CARGO_HIT: ${{ steps.cargo.outputs.cache-hit }}
        run: |
          BITCOIN_EMOJI="❌"
          [ "$BITCOIN_HIT" = "true" ] && BITCOIN_EMOJI="✅"
          CARGO_EMOJI="❌"
          [ "$CARGO_HIT" = "true" ] && CARGO_EMOJI="✅"

          echo "## Cache Status" >> $GITHUB_STEP_SUMMARY
          echo "| Cache | Cache Key | Exists? |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bitcoin | $BITCOIN_KEY | $BITCOIN_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| Cargo | $CARGO_KEY | $CARGO_EMOJI |" >> $GITHUB_STEP_SUMMARY

          # Fail the build gracefully if create-if-missing is false and a cache is missing
          if [ "$CREATE_IF_MISSING" = "false" ]; then
            if [ "$BITCOIN_HIT" != "true" ] || [ "$CARGO_HIT" != "true" ]; then
              echo "::error title=Required Cache Missing::A required cache (Bitcoin or Cargo) was not found. This should be rare. Re-run this action AFTER seeding the caches from master: https://github.com/stacks-network/stacks-core/actions/workflows/_seed-caches.yml"
              exit 1
            fi
          fi

  # Cache the bitcoin binary (if it doesn't exist and if we should create it)
  cache-bitcoin-binary:
    name: Build & Cache Bitcoin Binary
    needs:
      - check-caches
    runs-on: ubuntu-latest
    if: |
      !cancelled() && 
      needs.check-caches.outputs.bitcoin-cache-hit != 'true' &&
      inputs.create-if-missing == 'true'
    steps:
      # Checkout the code
      #   - only .github is required for checking caches
      - name: Checkout the latest code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      - name: Create Bitcoin Cache
        uses: ./.github/actions/cache/bitcoin
        with:
          action: create

  # Cache the cargo crates (if they doesn't exist and if we should create them)
  cache-cargo:
    name: Build & Cache Cargo Crates
    needs:
      - check-caches
    runs-on: ubuntu-latest
    if: |
      !cancelled() && 
      needs.check-caches.outputs.cargo-cache-hit != 'true' &&
      inputs.create-if-missing == 'true'
    steps:
      # Checkout the code
      #   - only .github is required for checking caches
      - name: Checkout the latest code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      - name: Create Cargo Cache
        uses: ./.github/actions/cache/cargo
        with:
          action: create
